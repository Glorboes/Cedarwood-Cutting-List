<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#19212c"/>
      <stop offset="1" stop-color="#0e1217"/>
    </linearGradient>
  </defs>
  <!-- background (full bleed for maskable) -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- board panel -->
  <rect x="116" y="150" width="280" height="212" rx="22"
        fill="#212a36" stroke="#384556" stroke-width="4"/>
  <!-- width dimension line with end ticks -->
  <g stroke="#4f8cff" stroke-width="12" stroke-linecap="round">
    <line x1="150" y1="256" x2="362" y2="256"/>
    <line x1="150" y1="226" x2="150" y2="286"/>
    <line x1="362" y1="226" x2="362" y2="286"/>
  </g>
  <!-- arrow heads -->
  <path d="M150 256 l34 -20 v40 z" fill="#4f8cff"/>
  <path d="M362 256 l-34 -20 v40 z" fill="#4f8cff"/>
  <!-- mm label -->
  <text x="256" y="330" text-anchor="middle" font-family="-apple-system,Helvetica,Arial,sans-serif"
        font-size="44" font-weight="800" fill="#e7ecf3" letter-spacing="1">mm</text>
</svg>
